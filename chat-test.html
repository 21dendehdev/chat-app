<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #chat {
      list-style: none;
      padding: 0;
    }
    #chat li {
      margin-bottom: 8px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 4px;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    #message {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Socket.IO Chat Test</h1>


  <div class="controls">
    <input id="message" placeholder="Type message..." autocomplete="off" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <ul id="chat"></ul>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script>
    const socket = io("http://localhost:5000");

    const senderId = prompt("Enter your user ID");
    const receiverId = prompt("Enter receiver ID");

    socket.emit("register_user", senderId);

    function sendMessage() {
      const msg = document.getElementById("message").value;

      socket.emit("send_message", {
        senderId,
        receiverId,
        message: msg
      });
    }

    socket.on("receive_message", (data) => {
      const li = document.createElement("li");
      li.textContent = `${data.senderId}: ${data.message}`;
      document.getElementById("chat").appendChild(li);
    });
  </script>
</body>
</html>
